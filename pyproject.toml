[build-system]
requires = ["scikit-build-core", "nanobind"]
build-backend = "scikit_build_core.build"

[project]
name = "Scribe"
version = "0.1.0"
authors = [{name = "DracoRooks"}]
description = "Custom C++20 tokenizer."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
classifiers = [
    "Programming Language :: C++",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License"
]

[tool.scikit-build]
cmake.version = ">=3.23"
cmake.args = ["-D_BUILD_PY_MOD=ON"]
ninja.make-fallback = true
install.components = ["python_module"]
wheel.packages = [
    "Scribe.cpython-*.so",
    "Scribe.pyi"
]
