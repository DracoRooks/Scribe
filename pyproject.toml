[build-system]
requires = ["scikit-build-core", "nanobind"]
build-backend = "scikit-build-core.build"

[project]
name = "Scribe"
version = "0.1.0"
authors = [{name = "DracoRooks"}]
description = "Custom C++20 tokenizer."
readme = "README.md"
requires-python = ">=3.14"

[tool.scikit-build]
cmake.version = ">=3.23"
ninja.make-fallback = true
install.components = ["python_module"]
